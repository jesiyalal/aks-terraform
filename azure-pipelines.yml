# Starter pipeline

# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:

- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.5.0'

# INIT
- task: TerraformTaskV4@4
  displayName: 'Terraform Init'
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: 'environments/dev'
    backendServiceArm: 'azure-dev-terraform-sc'
    backendAzureRmResourceGroupName: 'tf-backend-dev-rg'
    backendAzureRmStorageAccountName: 'tfbackenddev123'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'dev.terraform.tfstate'

# PLAN
- task: TerraformTaskV4@4
  displayName: 'Terraform Plan'
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: 'environments/dev'
    environmentServiceNameAzureRM: 'azure-dev-terraform-sc'

# APPLY
- task: TerraformTaskV4@4
  displayName: 'Terraform Apply'
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: 'environments/dev'
    environmentServiceNameAzureRM: 'azure-dev-terraform-sc'
    commandOptions: '-auto-approve'